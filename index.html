<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test de niveau coréen — Blabla Korean</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #DAD7DB;
      --card: #FFFFFF;
      --primary: #A25379;
      --primary-dk: #844463;
      --primary-lt: #F7F1F4;
      --text: #1A1A2E;
      --muted: #6B7280;
      --border: #E4E4E7;
      --radius: 18px;
      --shadow: 0 6px 32px rgba(0,0,0,0.09);
    }
    body {
      font-family: 'DM Sans', 'Noto Serif KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 60px;
    }
    /* ── Header ── */
    .hdr {
      width: 100%; max-width: 680px;
      padding: 24px 24px 0;
      display: flex; flex-direction: column; gap: 14px;
    }
    .logo {
      font-family: 'Noto Serif KR', serif;
      font-size: 17px; font-weight: 700;
      color: var(--primary); letter-spacing: -0.3px;
    }
    .prog-wrap { display: flex; align-items: center; gap: 12px; }
    .prog-bg {
      flex: 1; height: 5px;
      background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; background: var(--primary);
      border-radius: 99px; transition: width 0.5s ease; width: 0%;
    }
    .prog-lbl { font-size: 12px; color: var(--muted); white-space: nowrap; min-width: 36px; text-align: right; }
    /* ── Card ── */
    .main { width: 100%; max-width: 680px; padding: 28px 24px; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px; position: relative; overflow: hidden;
    }
    /* ── Track watermark ── */
    .wm {
      position: absolute; top: -24px; right: -8px;
      font-family: 'Noto Serif KR', serif;
      font-size: 140px; font-weight: 700;
      color: var(--primary); opacity: 0.04;
      pointer-events: none; user-select: none; line-height: 1;
    }
    /* ── Track badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--primary-lt); color: var(--primary);
      font-size: 11px; font-weight: 700;
      padding: 4px 11px; border-radius: 99px; margin-bottom: 20px;
      letter-spacing: 0.6px; text-transform: uppercase;
    }
    /* ── Question text ── */
    .q-label { font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
    .q-text {
      font-size: 21px; font-weight: 600; line-height: 1.45;
      margin-bottom: 28px; color: var(--text);
      font-family: 'DM Sans', 'Noto Serif KR', sans-serif;
      white-space: pre-line;
    }
    /* ── Input ── */
    .inp {
      width: 100%; padding: 14px 18px;
      border: 2px solid var(--border); border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 16px;
      color: var(--text); outline: none;
      transition: border-color 0.18s; background: #FAFAFA;
      margin-bottom: 28px;
    }
    .inp:focus { border-color: var(--primary); background: #fff; }
    /* ── Options ── */
    .opts { display: flex; flex-direction: column; gap: 9px; margin-bottom: 28px; }
    .opt {
      width: 100%; text-align: left;
      padding: 13px 16px; border: 2px solid var(--border);
      border-radius: 11px; background: #FAFAFA;
      font-family: 'DM Sans', 'Noto Serif KR', sans-serif;
      font-size: 14.5px; color: var(--text); cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex; align-items: center; gap: 11px; line-height: 1.4;
    }
    .opt:hover { border-color: var(--primary); background: var(--primary-lt); }
    .opt.sel { border-color: var(--primary); background: var(--primary-lt); color: var(--primary-dk); font-weight: 500; }
    .opt-letter {
      display: inline-flex; align-items: center; justify-content: center;
      width: 25px; height: 25px; min-width: 25px;
      border-radius: 50%; background: var(--border);
      font-size: 11px; font-weight: 700; color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .opt.sel .opt-letter { background: var(--primary); color: #fff; }
    /* ── Nav ── */
    .nav { display: flex; justify-content: space-between; align-items: center; }
    .btn-back {
      padding: 11px 18px; border: 2px solid var(--border); border-radius: 10px;
      background: transparent; font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .btn-back:hover { border-color: var(--muted); color: var(--text); }
    .btn-next {
      padding: 13px 28px; background: var(--primary); border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
      color: #fff; cursor: pointer; transition: all 0.15s; margin-left: auto;
    }
    .btn-next:hover:not(:disabled) { background: var(--primary-dk); transform: translateY(-1px); }
    .btn-next:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    /* ── Intro ── */
    .intro { text-align: center; }
    .intro-flag { font-size: 52px; margin-bottom: 16px; }
    .intro-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 28px; font-weight: 700; line-height: 1.35;
      margin-bottom: 12px;
    }
    .intro-sub { font-size: 15px; color: var(--muted); line-height: 1.7; margin-bottom: 28px; }
    .chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 36px; }
    .chip { padding: 6px 14px; background: var(--bg); border-radius: 99px; font-size: 13px; color: var(--muted); }
    .btn-start {
      display: inline-block; padding: 16px 40px;
      background: var(--primary); color: #fff; border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-start:hover { background: var(--primary-dk); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(162,83,121,0.28); }
    .btn-start:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }
    /* ── Buffer intro (Track B 진입 전 완충 화면) ── */
    .buffer-check {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin: 24px 0; font-size: 14.5px; color: var(--text); cursor: pointer;
    }
    .buffer-check input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
    /* ── Endings ── */
    .ending { text-align: center; }
    .end-icon { font-size: 54px; margin-bottom: 18px; }
    .end-title { font-family: 'Noto Serif KR', serif; font-size: 26px; font-weight: 700; line-height: 1.4; margin-bottom: 14px; }
    .end-text { font-size: 15px; color: var(--muted); line-height: 1.75; margin-bottom: 26px; }
    .end-box {
      background: var(--primary-lt); border-left: 3px solid var(--primary);
      padding: 16px 20px; border-radius: 8px; margin-bottom: 28px;
      text-align: left; font-size: 14.5px; line-height: 1.65;
    }
    .level-circle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 82px; height: 82px; background: var(--primary); color: #fff;
      border-radius: 50%; font-family: 'Noto Serif KR', serif;
      font-size: 26px; font-weight: 700; margin-bottom: 18px;
    }
    .btn-cta {
      display: inline-block; padding: 14px 32px;
      background: var(--primary); color: #fff; border: none; border-radius: 11px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; text-decoration: none; transition: all 0.15s;
    }
    .btn-cta:hover { background: var(--primary-dk); transform: translateY(-1px); }
    .btn-cta-ghost {
      display: inline-block; padding: 11px 28px; margin-top: 10px;
      border: 2px solid var(--primary); color: var(--primary);
      border-radius: 11px; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: all 0.15s;
    }
    .btn-cta-ghost:hover { background: var(--primary-lt); }
    /* ── Sending ── */
    .sending { text-align: center; padding: 48px 20px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.75s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ── Animation ── */
    @keyframes slideIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
    .slide-in { animation: slideIn 0.32s ease both; }
    /* ── Lang toggle ── */
    .lang-toggle { display: flex; gap: 6px; }
    .lang-btn {
      padding: 5px 13px; border: 2px solid var(--border); border-radius: 99px;
      background: #FFFFFF; font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 700; color: var(--muted); cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .lang-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
    /* ── Footer ── */
    .footer {
      width: 100%; max-width: 680px;
      padding: 0 24px 32px;
      text-align: center;
      font-size: 12px; color: var(--muted);
      line-height: 1.7;
    }
    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--primary); }
    /* ── Responsive ── */
    @media (max-width: 600px) {
      .card { padding: 26px 18px; }
      .q-text { font-size: 17px; }
      .intro-title { font-size: 23px; }
    }
  </style>
</head>

/* ── 저장된 언어 불러오기 (localStorage) ── */
const SAVED_LANG = (localStorage.getItem('bk_lang') === 'en') ? 'en' : 'fr';
let QS = (SAVED_LANG === 'en') ? QS_EN : QS_FR;

/* ID → index 맵 (FR/EN 모두 id·순서 동일) */
const IDX = {};
QS.forEach((q,i) => IDX[q.id] = i);

/* ================================================================
   🧠  STATE
   ================================================================ */
const ST = {
  screen: 'intro',
  lang: SAVED_LANG,
  qId: null,
  ans: {},        // qId → selectedIndex
  scores: {},     // 'B'→3, 'C'→2 …
  wrong: {},        // ← 신규: 트랙별 오답 카운트
  mcqAnsweredCount: 0,
  done: 0,
  hist: [],       // 뒤로 가기용 히스토리 스택
  finalLevel: null,  // ← 신규
  finalDetail: null, // ← 신규
};

const TOTAL = QS.length; /* 진행바 최대 */

/* ── 레벨 사다리 ── */
const LADDER = {
  B: { floor:'A0', target:'A1' },
  C: { floor:'A1', target:'A2' },
  D: { floor:'A2', target:'B1' },
  E: { floor:'B1', target:'B2' },
};

/* ── 조기종료/완주 시 최종 레벨 산출 ── */
function finishTest(tr, mode) {
  const band = LADDER[tr];
  const wrong = ST.wrong[tr] || 0;
  const correct = ST.scores[tr] || 0;
  let niveau, detail;

  if (mode === 'stopped') {
    if (correct >= 2)       { niveau = band.target; detail = band.floor + '++'; }
    else if (correct === 1) { niveau = band.floor;   detail = band.floor + '+'; }
    else                     { niveau = band.floor;   detail = band.floor; }
  } else { // 'passed' — 끝까지 다 풀고 통과한 채로 마지막 트랙 종료
    niveau = band.target;
    if (wrong === 0)      detail = band.target + '+';
    else if (wrong === 1) detail = band.target;
    else                   detail = band.target + '-';
  }

  ST.finalLevel = niveau;
  ST.finalDetail = detail;
  send('endB');
}

/* ================================================================
   🎛️  RENDER
   ================================================================ */
function render() {
  const card = document.getElementById('card');
  const pw   = document.getElementById('progWrap');
  const lw   = document.getElementById('langToggle');
  card.className = 'card slide-in';

  lw.style.display = (ST.screen === 'intro') ? 'flex' : 'none';
  lw.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === ST.lang));

  if (ST.screen === 'intro')    { pw.style.display='none';  card.innerHTML = introHTML(); }
  else if (ST.screen === 'buffer'){ pw.style.display='none'; card.innerHTML = bufferHTML(); }
  else if (ST.screen === 'q')   { pw.style.display='flex';  updateProg(); card.innerHTML = qHTML(); bindQ(); }
  else if (ST.screen === 'endA'){ pw.style.display='none';  card.innerHTML = endAHTML(); }
  else if (ST.screen === 'endB'){ pw.style.display='none';  card.innerHTML = endBHTML(); }
  else if (ST.screen === 'send'){ pw.style.display='none';  card.innerHTML = sendHTML(); }
}

function updateProg() {
  const cur = ST.qId && IDX[ST.qId] !== undefined ? IDX[ST.qId] + 1 : 0;
  const p = Math.min(100, Math.round((cur / TOTAL) * 100));
  document.getElementById('progFill').style.width = p + '%';
  document.getElementById('progLbl').textContent  = cur + ' / ' + TOTAL;
}

    <button class="btn-start" onclick="start()">${t.btn}</button>

  return `<div class="intro">
    <p class="intro-sub">${t.msg}</p>
    <label class="buffer-check">

    <button class="btn-start" id="bufferBtn" onclick="startTrackB()" disabled>${t.btn}</button>

/* ── Question ── */
function qHTML() {
  const q = QS[IDX[ST.qId]];
  const ui = UI[ST.lang];
  let h = '';
  const LTRS = 'ABCDEFGH';

  if (q.tr) {
    h += `<div class="wm">${q.tr}</div>`;
    h += `<div class="badge">${ui.niveauLbl} ${ui.badge[q.tr]} · ${q.tn}/${q.tt}</div>`;
  }

  if (q.type === 'txt') {
    h += `<p class="q-text">${q.label}<br><span style="font-size:0.65em;font-weight:400;color:var(--muted)">${q.korean}</span></p>
    <input type="${q.kind}" class="inp" id="inp" placeholder="${q.ph}" value="${ST.ans[ST.qId]||''}"
      autocomplete="${q.kind==='email'?'email':'given-name'}">
    <div class="nav">
      ${canBack()?`<button class="btn-back" onclick="back()">${ui.back}</button>`:'<div></div>'}
      <button class="btn-next" id="nxt" onclick="submitTxt()">${ui.next}</button>
    </div>`;
  } else {
    const label = q.type === 'cho' ? q.label : q.q;
    h += `<p class="q-text">${label.replace(/\n/g,'<br>')}</p>`;
    const selOpt = ST.ans[ST.qId] !== undefined ? q.opts[ST.ans[ST.qId]] : null;
    h += '<div class="opts">' + q.opts.map((o,i) =>
      `<button class="opt${ST.ans[ST.qId]===i?' sel':''}" onclick="pick('${ST.qId}',${i})" data-i="${i}">
        <span class="opt-letter">${LTRS[i]}</span><span>${o.l || o.label}</span>
      </button>`
    ).join('') + '</div>';
    if (selOpt && selOpt.other) {
      h += `<input type="text" class="inp" id="other-inp" placeholder="${ui.otherPh}" value="${ST.ans[ST.qId + '_other'] || ''}" autocomplete="off">`;
    }
    h += `<div class="nav">
      ${canBack()?`<button class="btn-back" onclick="back()">${ui.back}</button>`:'<div></div>'}
      <button class="btn-next" id="nxt" onclick="nextFn()" ${ST.ans[ST.qId]===undefined?'disabled':''}>${ui.next}</button>
    </div>`;
  }
  return h;
}

/* ================================================================
   🎮  EVENTS & LOGIC
   ================================================================ */
function start() { ST.screen='q'; ST.qId='nom'; render(); }

/* ── 완충 화면 체크박스/시작 ── */
function onBufferCheck() {
  document.getElementById('bufferBtn').disabled = !document.getElementById('bufferChk').checked;
}
function startTrackB() {
  ST.screen = 'q'; ST.qId = 'B1'; render();
}

/* ── 언어 전환 (인트로 화면에서만 노출) ── */
function setLang(l) {
  if (l === ST.lang) return;
  ST.lang = l;
  localStorage.setItem('bk_lang', l);
  QS = (l === 'en') ? QS_EN : QS_FR;
  document.documentElement.lang = l;
  document.title = UI[l].title;
  document.getElementById('footer').innerHTML = UI[l].footer;
  render();
}

function bindQ() {
  const otherInp = document.getElementById('other-inp');
  if (otherInp) {
    const nxt = document.getElementById('nxt');
    const chkOther = () => {
      ST.ans[ST.qId + '_other'] = otherInp.value.trim();
      if (nxt) nxt.disabled = !otherInp.value.trim();
    };
    otherInp.addEventListener('input', chkOther);
    otherInp.addEventListener('keydown', e => { if(e.key==='Enter') nextFn(); });
    chkOther(); otherInp.focus();
    return;
  }
  const inp = document.getElementById('inp');
  if (!inp) return;
  const nxt = document.getElementById('nxt');
  const chk = () => { if(nxt) nxt.disabled = !inp.value.trim(); };
  inp.addEventListener('input', chk);
  inp.addEventListener('keydown', e => { if(e.key==='Enter') submitTxt(); });
  chk(); inp.focus();
}

function submitTxt() {
  const inp = document.getElementById('inp');
  if (!inp || !inp.value.trim()) return;
  /* 이메일 형식 검증 */
  if (ST.qId === 'email') {
    const ok = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(inp.value.trim());
    if (!ok) {
      inp.style.borderColor = 'var(--primary)';
      let err = document.getElementById('inp-err');
      if (!err) {
        err = document.createElement('p');
        err.id = 'inp-err';
        err.style.cssText = 'color:var(--primary);font-size:13px;margin:-18px 0 16px;';
        inp.insertAdjacentElement('afterend', err);
      }
      err.textContent = UI[ST.lang].emailErr;
      inp.focus(); return;
    }
    /* 오류 있으면 제거 */
    const err = document.getElementById('inp-err');
    if (err) err.remove();
    inp.style.borderColor = '';
  }
  ST.ans[ST.qId] = inp.value.trim();
  ST.done++;
  advance(ST.qId, null);
}

function pick(qId, i) {
  ST.ans[qId] = i;
  const q = QS[IDX[qId]];
  if (q.opts[i] && q.opts[i].other) {
    render();
    return;
  }
  /* UI 즉시 반영 */
  document.querySelectorAll('.opt').forEach((b, bi) => {
    b.classList.toggle('sel', bi === i);
    b.querySelector('.opt-letter').style.background = bi===i ? 'var(--primary)' : '';
    b.querySelector('.opt-letter').style.color      = bi===i ? '#fff'           : '';
  });
  const nxt = document.getElementById('nxt');
  if (nxt) nxt.disabled = false;
  /* 400ms 후 자동 다음으로 */
  setTimeout(() => { ST.done++; advance(qId, i); }, 420);
}

function nextFn() {
  if (ST.ans[ST.qId] !== undefined) {
    const q = QS[IDX[ST.qId]];
    const opt = q.opts[ST.ans[ST.qId]];
    if (opt && opt.other) {
      if (!((ST.ans[ST.qId + '_other'] || '').trim())) return;
      ST.done++;
    }
    advance(ST.qId, ST.ans[ST.qId]);
  }
}

function canBack() {
  return ST.hist.length > 0;
}

function back() {
  if (ST.hist.length === 0) return;
  const prevId = ST.hist.pop();
  const prevQ  = QS[IDX[prevId]];
  /* MCQ면 해당 질문의 점수·답변 취소 */
  if (prevQ.type === 'mcq') {
    const prevAns = ST.ans[prevId];
    if (prevAns !== undefined) {
      if (prevQ.opts[prevAns] && prevQ.opts[prevAns].c)
        ST.scores[prevQ.tr] = Math.max(0, (ST.scores[prevQ.tr]||0) - 1);
      else
        ST.wrong[prevQ.tr] = Math.max(0, (ST.wrong[prevQ.tr]||0) - 1);
      delete ST.ans[prevId];
    }
  }
  ST.done = Math.max(0, ST.done - 1);
  fade(() => { ST.qId = prevId; render(); });
}

/* ── 다음 질문 결정 ── */
function advance(qId, selIdx) {
  ST.hist.push(qId);          /* ← 히스토리에 현재 qId 저장 */
  const q = QS[IDX[qId]];

  /* 경험 분기 */
  if (qId === 'exp' && selIdx !== null) {
    const opt = q.opts[selIdx];
    if (opt.end === 'A') { send('endA'); return; }
    /* Track B 시작 전 완충 화면으로 */
    fade(() => { ST.screen = 'buffer'; render(); });
    return;
  }

  /* MCQ 채점 */
  if (q.type === 'mcq' && selIdx !== null) {
    if (!ST.scores[q.tr]) ST.scores[q.tr] = 0;
    if (!ST.wrong[q.tr])  ST.wrong[q.tr]  = 0;
    ST.mcqAnsweredCount++;

    if (q.opts[selIdx].c) {
      ST.scores[q.tr]++;
    } else {
      ST.wrong[q.tr]++;
      if (ST.mcqAnsweredCount >= 6 && ST.wrong[q.tr] >= 3) {
        finishTest(q.tr, 'stopped');
        return;
      }
    }
  }

  const nextId = nextQ(qId);
  if (nextId === 'FINISH') { finishTest(q.tr, 'passed'); return; }
  if (nextId === 'endB')   { send('endB'); return; }
  fade(() => { ST.qId = nextId; render(); });
}

function nextQ(curId) {
  const q = QS[IDX[curId]];

  /* text/choice → 배열 순서대로 */
  if (q.type === 'txt' || q.type === 'cho') {
    const nxt = QS[IDX[curId] + 1];
    return nxt ? nxt.id : 'endB';
  }

  /* MCQ → 같은 트랙 내 다음 or 다음 트랙 */
  if (q.tn < q.tt) return q.tr + (q.tn + 1);
  return nextTrack(q.tr);
}

function nextTrack(tr) {
  const ORDER = ['B','C','D','E'];
  if (tr === 'E') return 'FINISH';
  const ni = ORDER.indexOf(tr) + 1;
  const next = ORDER[ni];
  console.log('Track 전환:', tr, '→', next,
    '| wrong[' + tr + ']=' + (ST.wrong[tr] || 0) + ' (유지)',
    '| wrong[' + next + ']=0부터 시작 (트랙별 독립 카운트)');
  return next + '1';
}

/* ================================================================
   📊  레벨 계산
   ================================================================ */
function calcLevel() {
  const b = ST.scores.B ?? 0;
  const c = ST.scores.C ?? 0;
  const d = ST.scores.D ?? 0;
  const e = ST.scores.E ?? 0;
  /* 점수가 처음 임계값 이하로 떨어지는 트랙이 현재 레벨 */
  if (b <= 2) return b <= 1 ? 'A0' : 'A1';
  if (c <= 2) return 'A1';
  if (d <= 2) return 'A2';
  if (e <= 2) return 'B1';
  return 'B2';
}

/* ================================================================
   📡  GAS 전송
   ================================================================ */
async function send(ending) {
  ST.screen = 'send'; render();
  const lv     = ending === 'endA' ? 'A0' : (ST.finalLevel  || calcLevel());
  const detail = ending === 'endA' ? 'A0' : (ST.finalDetail || lv);
  const sourceOpt = ST.ans['source'] !== undefined ? QS[IDX['source']].opts[ST.ans['source']] : null;
  const src = sourceOpt ? (sourceOpt.other ? `autre: ${ST.ans['source_other'] || ''}` : sourceOpt.v) : '';
  const expOpt = ST.ans['exp'] !== undefined ? QS[IDX['exp']].opts[ST.ans['exp']] : null;
  const exp = expOpt ? expOpt.v : '';
  const total = (ST.scores.B||0)+(ST.scores.C||0)+(ST.scores.D||0)+(ST.scores.E||0);
  const payload = {
    timestamp : new Date().toISOString(),
    nom       : ST.ans['nom']   || '',
    name      : ST.ans['nom']   || '',
    email     : ST.ans['email'] || '',
    source    : src,
    experience: exp,
    score_B   : ST.scores.B ?? '',
    score_C   : ST.scores.C ?? '',
    score_D   : ST.scores.D ?? '',
    score_E   : ST.scores.E ?? '',
    total     : total,
    score     : total,
    niveau        : lv,
    level         : lv,
    niveauDetail  : detail,
    studyDuration: expOpt ? expOpt.label : '',
    ending    : ending,
    lang      : ST.lang,
  };
  try {
    if (CFG.gas_url !== 'PASTE_YOUR_GAS_URL_HERE') {
      await fetch(CFG.gas_url, { method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    } else {
      console.log('[DEV] GAS payload:', payload);
      await new Promise(r => setTimeout(r, 700));
    }
  } catch(e) { console.error('GAS error:', e); }
  ST.screen = ending; render();
}

/* ── 전환 애니메이션 ── */
function fade(cb) {
  const c = document.getElementById('card');
  c.style.cssText = 'opacity:0;transform:translateX(-18px);transition:opacity .18s,transform .18s';
  setTimeout(() => {
    cb();
    c.style.cssText = '';
    c.className = 'card slide-in';
  }, 185);
}

/* ── 초기화 ── */
document.documentElement.lang = ST.lang;
document.title = UI[ST.lang].title;
document.getElementById('footer').innerHTML = UI[ST.lang].footer;
render();
</script>
</body>
